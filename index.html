<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Tools Hub</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">

    <!-- AdSense -->
    <script async
            src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-19878XXXXXXXXX"
            crossorigin="anonymous"></script>
</head>

<body>

<!-- PARTICLES -->
<canvas id="particles"></canvas>

<!-- NAVBAR -->
<nav class="navbar navbar-dark p-3">
    <a class="navbar-brand fw-bold" href="#">AI Tools Hub</a>
</nav>

<!-- HERO -->
<div class="hero">
    <h1>Discover the Best AI Tools</h1>
    <p class="text-secondary">Find, compare and explore 1500+ AI tools instantly</p>

    <input id="search"
           class="form-control form-control-lg text-white bg-dark"
           placeholder="Search AI tools...">
</div>

<div class="container">

    <select id="categoryFilter" class="form-select text-white bg-dark mb-4">
        <option value="">All Categories</option>
    </select>

    <button onclick="compareSelected()" class="btn btn-primary compare-btn">
        Compare Selected Tools
    </button>

    <div id="tools" class="row"></div>

    <!-- ADSENSE -->
    <div class="my-5 text-center">
        <ins class="adsbygoogle"
             style="display:block"
             data-ad-client="ca-pub-19878XXXXXXXXX"
             data-ad-slot="YOUR_SLOT_ID"
             data-ad-format="auto"></ins>
    </div>

</div>

<script src="data.js"></script>
<script src="script.js"></script>
<script src="add.js"></script>

<script>
    (adsbygoogle = window.adsbygoogle || []).push({});
</script>

</body>
</html>
